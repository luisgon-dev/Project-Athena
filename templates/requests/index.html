{% extends "layout.html" %}

{% block title %}Admin Requests{% endblock %}

{% block content %}
<h1>New request</h1>
<form method="post" action="/requests">
  <label>Title
    <input name="title" value="The Hobbit">
  </label>
  <label>Author
    <input name="author" value="J.R.R. Tolkien">
  </label>
  <label>Media type
    <select name="media_type">
      <option value="ebook">Ebook</option>
      <option value="audiobook" selected>Audiobook</option>
    </select>
  </label>
  <label>Preferred language
    <input name="preferred_language" value="en">
  </label>
  <label>Edition title
    <input name="edition_title">
  </label>
  <label>Preferred narrator
    <input name="preferred_narrator">
  </label>
  <label>Preferred publisher
    <input name="preferred_publisher">
  </label>
  <label>
    <input type="checkbox" name="graphic_audio">
    Graphic audio
  </label>
  <button type="submit">Create request</button>
</form>
{% endblock %}
