<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Book Router{% endblock %}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 2rem;
        background: #f7f5f1;
        color: #1f1f1f;
      }
      main {
        max-width: 68rem;
        margin: 0 auto;
        background: white;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      }
      label {
        display: block;
        margin-top: 1rem;
        font-weight: 600;
      }
      fieldset {
        margin-top: 1rem;
        padding: 1rem;
        border: 1px solid #d8d0c6;
        border-radius: 0.75rem;
      }
      legend {
        padding: 0 0.4rem;
        font-weight: 700;
      }
      input, select {
        width: 100%;
        margin-top: 0.4rem;
        padding: 0.7rem 0.8rem;
        border: 1px solid #cfc7bc;
        border-radius: 0.5rem;
      }
      .choice {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 500;
      }
      .choice input {
        width: auto;
        margin-top: 0;
      }
      .choice span {
        display: inline-block;
      }
      button {
        margin-top: 1.25rem;
        padding: 0.8rem 1rem;
        border: 0;
        border-radius: 0.6rem;
        background: #1f1f1f;
        color: white;
        font-weight: 700;
      }
      a {
        color: #114b8c;
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .eyebrow {
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.8rem;
        color: #7a6f60;
      }
      .lede {
        color: #5f564c;
        max-width: 48rem;
      }
      .button-link {
        display: inline-block;
        padding: 0.8rem 1rem;
        border-radius: 0.6rem;
        background: #1f1f1f;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
      .empty-state {
        padding: 1rem 1.25rem;
        border: 1px dashed #cfc7bc;
        border-radius: 0.75rem;
        background: #fbfaf7;
      }
      .request-table {
        width: 100%;
        border-collapse: collapse;
      }
      .request-table th,
      .request-table td {
        padding: 0.9rem 0.75rem;
        border-bottom: 1px solid #ece6de;
        text-align: left;
        vertical-align: top;
      }
      .status-pill {
        display: inline-block;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        background: #efe7dc;
        color: #5b4837;
        font-size: 0.9rem;
      }
      .search-form {
        margin-bottom: 1.5rem;
      }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr));
        gap: 1rem;
      }
      .match-grid {
        display: grid;
        gap: 1rem;
        margin-top: 1rem;
      }
      .match-card {
        display: block;
        border: 1px solid #d8d0c6;
        border-radius: 0.9rem;
        padding: 1rem;
      }
      .match-card input[type="radio"] {
        width: auto;
        margin: 0 0 1rem 0;
      }
      .match-card-body {
        display: grid;
        grid-template-columns: 7rem 1fr;
        gap: 1rem;
      }
      .cover-image,
      .cover-placeholder {
        width: 7rem;
        height: 10rem;
        border-radius: 0.75rem;
        object-fit: cover;
        background: linear-gradient(180deg, #ece2d5, #d9ccb7);
      }
      .cover-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #5b4837;
        font-weight: 700;
        text-align: center;
        padding: 0.75rem;
      }
      .match-heading h3 {
        margin: 0;
      }
      .match-heading p {
        margin: 0.35rem 0 0;
        color: #5f564c;
      }
      .meta-row,
      .subject-row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.8rem;
      }
      .description {
        margin-top: 0.8rem;
        color: #37322d;
      }
      .tag {
        display: inline-block;
        padding: 0.25rem 0.55rem;
        border-radius: 999px;
        background: #f1ebdf;
        color: #4f4337;
        font-size: 0.88rem;
      }
      .canonical-id {
        margin-top: 0.9rem;
        color: #75695b;
        font-size: 0.92rem;
      }
      @media (max-width: 720px) {
        body {
          padding: 1rem;
        }
        main {
          padding: 1.2rem;
        }
        .page-header {
          flex-direction: column;
        }
        .match-card-body {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
